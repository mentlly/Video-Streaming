events {}

http {
    server {
        listen 80;
        server_name localhost;

        client_max_body_size 0;

        location /api/auth/ {
            proxy_pass http://auth:3000;
        }

        location /api/video/ {
            proxy_pass http://video-manager:8080;

            proxy_request_buffering off;
            proxy_buffering off;
        }
    }
}