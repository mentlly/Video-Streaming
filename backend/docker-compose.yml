services:
  auth:
    build: ./auth
    expose:
      - "${NODE_API_PORT}"
    env_file:
      - .env
    volumes:
      - ./auth:/app
      - /app/node_modules
    #this line for testing
    command: node --watch index.js
    depends_on:
      - postgres
  
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" # Maps port 5432 to your laptop so GUI tools can connect
    volumes:
      - postgres_data:/var/lib/postgresql/data # The data persistence anchor
  
  go-video-management:
    build: ./go-video-management
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - go_uploads_data:/app/uploads
  
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - go-video-management


volumes:
  postgres_data:
  go_uploads_data:
